name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Installs pnpm (reads version automatically from package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 2. Sets up Node.js and caches your node_modules
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 3. Installs your project dependencies
      - name: Install dependencies
        run: pnpm install

      # 4. Caches your Turborepo build outputs (speeds up subsequent builds)
      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # 5. Runs your code checks
      - name: Typecheck
        run: pnpm typecheck

      # 6. Builds the app (Turbo will use the cache from step 4 if nothing changed)
      - name: Build
        run: pnpm build
